<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wavelength</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1e293b;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .header .logo { font-size: 20px; }
    .header .title { font-weight: 600; font-size: 16px; }
    .content { padding: 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.connected {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
    }
    .status.disconnected {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.green { background: #16a34a; }
    .dot.red { background: #dc2626; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      margin-bottom: 8px;
    }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-outline {
      background: white;
      color: #4f46e5;
      border: 1px solid #c7d2fe;
    }
    .btn-outline:hover { background: #eef2ff; }
    .btn-danger {
      background: white;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    .btn-danger:hover { background: #fef2f2; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4f46e5;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }
    .user-details {
      min-width: 0;
    }
    .user-email {
      font-size: 13px;
      color: #64748b;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
    }
    #login-section, #connected-section { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">&#127754;</span>
    <span class="title">Wavelength</span>
  </div>

  <div class="content">
    <div id="login-section">
      <div class="status disconnected">
        <span class="dot red"></span>
        Not connected
      </div>
      <p style="font-size: 13px; color: #64748b; margin-bottom: 12px;">
        Sign in to get personality-aware coaching in your Gmail compose window.
      </p>
      <button id="sign-in-btn" class="btn btn-primary">Sign In</button>
    </div>

    <div id="connected-section">
      <div class="status connected">
        <span class="dot green"></span>
        Connected
      </div>
      <div class="user-info">
        <div class="avatar" id="user-avatar">?</div>
        <div class="user-details">
          <div id="user-email" class="user-email"></div>
        </div>
      </div>
      <p style="font-size: 13px; color: #64748b; margin-bottom: 12px;">
        Wavelength is active! Open a Gmail compose window to see coaching suggestions.
      </p>
      <a href="https://mywavelength.ai/dashboard" target="_blank" class="btn btn-outline">
        Open Dashboard
      </a>
      <button id="sign-out-btn" class="btn btn-danger">Sign Out</button>
    </div>
  </div>

  <div class="footer">
    Wavelength v0.1.0 &mdash; Communication coaching
  </div>

  <script src="popup.js"></script>
</body>
</html>
